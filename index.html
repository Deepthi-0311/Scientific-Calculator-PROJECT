<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Advanced Calculator</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<div class="calculator">

<input type="text" id="display" disabled>

<div class="buttons">

<button class="clear">C</button>
<button id="del">⌫</button>
<button>(</button>
<button>)</button>
<button class="operator">/</button>

<button>7</button>
<button>8</button>
<button>9</button>
<button class="operator">*</button>
<button class="func" id="sqrt">√</button>

<button>4</button>
<button>5</button>
<button>6</button>
<button class="operator">-</button>
<button class="func" id="square">x²</button>

<button>1</button>
<button>2</button>
<button>3</button>
<button class="operator">+</button>
<button class="func" id="cube">x³</button>

<button>0</button>
<button>.</button>
<button id="pi">π</button>
<button class="func" id="log">log</button>
<button class="equal">=</button>

<button class="func" id="sin">sin</button>
<button class="func" id="cos">cos</button>
<button class="func" id="tan">tan</button>
<button class="func" id="logSquare">log²</button>

</div>
</div>

<script src="script.js"></script>
</body>
</html>
